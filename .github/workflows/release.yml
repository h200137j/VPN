name: Release

on:
  push:
    tags:
      - 'v*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  # ── Linux .deb ──────────────────────────────────────────────────────────────
  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            pkg-config \
            build-essential \
            imagemagick \
            dpkg-dev

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install frontend dependencies
        run: npm install
        working-directory: frontend

      - name: Build with Wails
        run: wails build -tags webkit2_41 -ldflags "-X main.version=${{ github.ref_name }}"

      - name: Rename binary
        run: mv build/bin/vpn build/bin/govpn

      - name: Build .deb package
        run: |
          VERSION=${{ github.ref_name }}
          VERSION=${VERSION#v}
          PKG=govpn_${VERSION}_amd64

          mkdir -p ${PKG}/DEBIAN
          mkdir -p ${PKG}/usr/bin
          mkdir -p ${PKG}/usr/share/applications
          mkdir -p ${PKG}/usr/share/icons/hicolor/256x256/apps

          cp build/bin/govpn ${PKG}/usr/bin/govpn
          chmod 755 ${PKG}/usr/bin/govpn

          convert -background none build/icon.svg -resize 256x256 \
            ${PKG}/usr/share/icons/hicolor/256x256/apps/govpn.png

          cat > ${PKG}/usr/share/applications/govpn.desktop << EOF
          [Desktop Entry]
          Name=GoVPN
          Comment=Lightweight OpenVPN client
          Exec=/usr/bin/govpn
          Icon=govpn
          Terminal=false
          Type=Application
          Categories=Network;
          StartupNotify=true
          EOF

          cat > ${PKG}/DEBIAN/control << EOF
          Package: govpn
          Version: ${VERSION}
          Section: net
          Priority: optional
          Architecture: amd64
          Depends: openvpn, libgtk-3-0, libwebkit2gtk-4.1-0, libayatana-appindicator3-1
          Maintainer: calvin <73125365+h200137j@users.noreply.github.com>
          Description: Lightweight OpenVPN client for Linux
           A simple but effective OpenVPN client built with Go and Wails.
          EOF

          dpkg-deb --build --root-owner-group ${PKG}

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-artifacts
          path: |
            build/bin/govpn
            govpn_*_amd64.deb

  # ── Windows .exe ────────────────────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install frontend dependencies
        run: npm install
        working-directory: frontend

      - name: Build with Wails
        run: wails build -ldflags "-X main.version=${{ github.ref_name }}"

      - name: Rename exe
        run: mv build/bin/vpn.exe build/bin/govpn.exe

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-artifacts
          path: build/bin/govpn.exe

  # ── GitHub Release ──────────────────────────────────────────────────────────
  release:
    needs: [build-linux, build-windows]
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Download Linux artifacts
        uses: actions/download-artifact@v4
        with:
          name: linux-artifacts
          path: dist/linux

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-artifacts
          path: dist/windows

      - name: Get tag message
        id: tag_msg
        run: |
          MSG=$(git tag -l --format='%(contents)' ${{ github.ref_name }})
          echo "body<<EOF" >> $GITHUB_OUTPUT
          echo "$MSG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: GoVPN ${{ github.ref_name }}
          body: |
            ${{ steps.tag_msg.outputs.body }}

            ---
            **Linux:** `sudo dpkg -i govpn_*_amd64.deb`
            **Windows:** Run `govpn.exe` (requires OpenVPN installed)
          files: |
            dist/linux/govpn
            dist/linux/govpn_*_amd64.deb
            dist/windows/govpn.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
